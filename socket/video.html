<!DOCTYPE html>
<html>
<head>
    <title>Video Call Test 🎥</title>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N.js"></script>
    <style>
        #video-grid {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .video-box {
            width: 300px;
            height: 200px;
            background: black;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <h2>IntellMeet Video Call 🎥</h2>

    <input id="channel" placeholder="Channel Name" value="meeting123" />
    <button onclick="joinCall()">Join Call 📹</button>
    <button onclick="leaveCall()">Leave Call ❌</button>
    <button onclick="toggleMute()">Mute/Unmute 🎤</button>

    <div id="video-grid">
        <div class="video-box" id="local-video"></div>
    </div>

    <p id="status">Status: Not Connected</p>

    <script>
        // உன் Agora App ID இங்க போடு
        const APP_ID = "2e62fed16b2242a5821798ff7d79b98c";
        const TOKEN = "007eJxTYNi8UnXStqat8xNOzi3LqNUy2jmR+297/9EFbE0tLh+aBC0VGIxSzYzSUlMMzZKMjEyMEk0tjAzNLS3S0sxTzC2TLC2Sgyx1sxoCGRmYnoowMzJAIIjPxZCbmlqSmZduaGTMwAAADnAgLg==";
        
        const client = AgoraRTC.createClient({ 
            mode: "rtc", 
            codec: "vp8" 
        });

        let localTracks = [];
        let isMuted = false;

        // Join Call
        async function joinCall() {
            const channel = document.getElementById("channel").value;
            document.getElementById("status").innerText = "Connecting...";

            // Agora-ல join பண்ணும்
            await client.join(APP_ID, channel, TOKEN, null);

            // Camera + Mic on பண்ணும்
            localTracks = await AgoraRTC.createMicrophoneAndCameraTracks();

            // Local video show பண்ணும்
            localTracks[1].play("local-video");

            // Publish பண்ணும்
            await client.publish(localTracks);

            document.getElementById("status").innerText = "✅ Connected!";
        }

        // மத்தவன் join ஆனா — video show பண்ணும்
        client.on("user-published", async (user, mediaType) => {
            await client.subscribe(user, mediaType);

            if (mediaType === "video") {
                // புது video box create பண்ணும்
                const div = document.createElement("div");
                div.id = `user-${user.uid}`;
                div.className = "video-box";
                document.getElementById("video-grid").appendChild(div);

                user.videoTrack.play(`user-${user.uid}`);
            }

            if (mediaType === "audio") {
                user.audioTrack.play();
            }
        });

        // மத்தவன் leave ஆனா — video remove பண்ணும்
        client.on("user-unpublished", (user) => {
            const div = document.getElementById(`user-${user.uid}`);
            if (div) div.remove();
        });

        // Leave Call
        async function leaveCall() {
            localTracks.forEach(track => track.close());
            await client.leave();
            document.getElementById("local-video").innerHTML = "";
            document.getElementById("status").innerText = "❌ Disconnected";
        }

        // Mute/Unmute
        async function toggleMute() {
            isMuted = !isMuted;
            await localTracks[0].setMuted(isMuted);
            document.getElementById("status").innerText = 
                isMuted ? "🔇 Muted" : "🎤 Unmuted";
        }
    </script>
</body>
</html>
